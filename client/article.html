<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Article — ConflictPulse</title>
  <meta name="description" content="Full article view with AI summary, conflict score and entity analysis."/>
  <meta name="google-adsense-account" content="ca-pub-8026135429131617">
  <!-- OG tags updated dynamically by JS -->
  <meta property="og:title" content="ConflictPulse — AI War Intelligence"/>
  <meta property="og:description" content="Real-time conflict news powered by Gemini AI"/>
  <meta property="og:image" content="icons/icon-512.png"/>
  <meta property="og:type" content="article"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="icons/icon-192.png"/>
  <meta name="theme-color" content="#0A0E1A"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"/>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8026135429131617" crossorigin="anonymous"></script>
  <style>
    :root{
      --bg:#0A0E1A; --bg2:#111827; --bg3:#1E2D40;
      --accent:#FF3B3B; --blue:#3B82F6;
      --green:#22C55E; --amber:#F59E0B;
      --text:#F0F4F8; --muted:#94A3B8; --border:#1E293B;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

    /* NAV */
    nav{position:sticky;top:0;z-index:100;padding:0.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center;background:rgba(10,14,26,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);}
    .logo{display:flex;align-items:center;gap:0.5rem;text-decoration:none;}
    .logo-pulse{width:9px;height:9px;background:var(--accent);border-radius:50%;animation:pulse 1.5s infinite;}
    .logo-text{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;color:var(--text);}
    .logo-text span{color:var(--accent);}
    .nav-right{display:flex;align-items:center;gap:0.8rem;}
    .back-btn{color:var(--muted);text-decoration:none;font-size:0.85rem;font-weight:600;display:flex;align-items:center;gap:0.4rem;transition:all 0.2s;background:var(--bg3);border:1px solid var(--border);padding:0.42rem 0.9rem;border-radius:8px;}
    .back-btn:hover{color:var(--text);border-color:var(--muted);}

    /* PROGRESS BAR */
    .read-progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--blue));z-index:200;transition:width 0.1s linear;width:0%;}

    /* PAGE */
    .page{max-width:820px;margin:0 auto;padding:2.5rem 1.5rem 5rem;}

    /* HERO IMAGE */
    .article-hero{width:100%;height:420px;object-fit:cover;border-radius:16px;margin-bottom:2rem;border:1px solid var(--border);display:block;}
    .article-hero-placeholder{width:100%;height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.7rem;font-size:5rem;border-radius:16px;margin-bottom:2rem;border:1px solid var(--border);position:relative;overflow:hidden;}
    .article-hero-placeholder::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--bg3),var(--bg2));}
    .article-hero-placeholder span,.article-hero-placeholder small{position:relative;z-index:1;}
    .article-hero-placeholder small{font-size:0.82rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;}

    /* META */
    .article-meta{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1.2rem;align-items:center;}
    .badge{display:inline-flex;align-items:center;gap:0.25rem;padding:0.22rem 0.7rem;border-radius:99px;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;}
    .badge-breaking{background:rgba(255,59,59,0.15);color:var(--accent);border:1px solid rgba(255,59,59,0.3);animation:blink 1.5s infinite;}
    .badge-high{background:rgba(245,158,11,0.15);color:var(--amber);}
    .badge-medium{background:rgba(59,130,246,0.15);color:var(--blue);}
    .badge-low{background:rgba(148,163,184,0.1);color:var(--muted);}
    .badge-region{background:var(--bg3);color:var(--muted);}
    .badge-topic{background:rgba(34,197,94,0.1);color:var(--green);}
    .article-date{font-size:0.8rem;color:var(--muted);margin-left:auto;}

    /* TITLE */
    .article-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.6rem,4vw,2.3rem);font-weight:700;line-height:1.25;margin-bottom:1.2rem;letter-spacing:-0.02em;}

    /* SOURCE ROW */
    .source-row{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:2rem;flex-wrap:wrap;gap:0.8rem;}
    .source-info{display:flex;align-items:center;gap:0.8rem;}
    .source-avatar{width:38px;height:38px;background:var(--bg3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;border:1px solid var(--border);}
    .source-name{font-weight:700;font-size:0.9rem;}
    .source-label{font-size:0.72rem;color:var(--muted);}
    .source-stats{display:flex;gap:1.5rem;}
    .stat-item{text-align:center;}
    .stat-num{font-size:1rem;font-weight:700;}
    .stat-label{font-size:0.68rem;color:var(--muted);}

    /* AI SUMMARY BOX */
    .summary-box{background:linear-gradient(135deg,rgba(255,59,59,0.04),rgba(59,130,246,0.04));border:1px solid rgba(255,59,59,0.2);border-radius:14px;padding:1.5rem 1.6rem;margin-bottom:2rem;position:relative;overflow:hidden;}
    .summary-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--blue));}
    .summary-label{display:flex;align-items:center;gap:0.5rem;font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);margin-bottom:0.9rem;}
    .summary-text{font-size:1rem;line-height:1.85;color:var(--text);}

    /* AD UNIT */
    .ad-unit{background:var(--bg2);border:1px dashed rgba(148,163,184,0.12);border-radius:12px;padding:0.8rem;text-align:center;margin-bottom:2rem;overflow:hidden;}
    .ad-unit-label{font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.4rem;opacity:0.5;}

    /* STATS GRID */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
    .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:1rem;text-align:center;transition:transform 0.15s;}
    .stat-card:hover{transform:scale(1.03);}
    .stat-card-num{font-family:'Space Grotesk',sans-serif;font-size:1.45rem;font-weight:700;margin-bottom:0.25rem;}
    .stat-card-label{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}

    /* CONFLICT SCORE */
    .score-section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:2rem;}
    .score-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
    .score-title{font-weight:700;font-size:0.95rem;}
    .score-sub{font-size:0.78rem;color:var(--muted);margin-top:0.15rem;}
    .score-number{font-family:'Space Grotesk',sans-serif;font-size:2.8rem;font-weight:800;line-height:1;}
    .score-track{height:9px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:0.6rem;}
    .score-fill{height:100%;border-radius:5px;transition:width 1.1s cubic-bezier(0.4,0,0.2,1);}
    .score-levels{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--muted);margin-bottom:0.8rem;}
    .score-desc{font-size:0.85rem;line-height:1.6;color:var(--muted);padding:0.7rem 1rem;background:var(--bg3);border-radius:8px;}

    /* ENTITIES */
    .entities-section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:2rem;}
    .section-title{font-weight:800;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:1rem;}
    .entities-wrap{display:flex;flex-wrap:wrap;gap:0.5rem;}
    .entity-tag{background:var(--bg3);color:var(--text);font-size:0.82rem;padding:0.32rem 0.85rem;border-radius:7px;border:1px solid var(--border);transition:all 0.15s;cursor:default;}
    .entity-tag:hover{border-color:var(--accent);color:var(--accent);}

    /* RELATED */
    .related-section{margin-bottom:2rem;}
    .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;margin-top:1rem;}
    .related-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:1rem;cursor:pointer;transition:all 0.2s;text-decoration:none;display:block;}
    .related-card:hover{border-color:rgba(255,59,59,0.35);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
    .related-badge{font-size:0.65rem;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.4rem;}
    .related-title{font-size:0.875rem;font-weight:600;line-height:1.4;color:var(--text);margin-bottom:0.4rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .related-meta{font-size:0.72rem;color:var(--muted);}

    /* READ ORIGINAL */
    .read-original{display:flex;align-items:center;justify-content:center;gap:0.7rem;background:var(--accent);color:#fff;padding:1rem 2rem;border-radius:11px;font-weight:700;font-size:1rem;text-decoration:none;margin-bottom:2rem;transition:all 0.22s;box-shadow:0 4px 20px rgba(255,59,59,0.3);}
    .read-original:hover{background:#cc2f2f;box-shadow:0 8px 32px rgba(255,59,59,0.5);transform:translateY(-2px);}
    .read-original:active{transform:scale(0.97);}

    /* ACTIONS BAR */
    .actions-bar{display:flex;gap:0.8rem;margin-bottom:2rem;flex-wrap:wrap;}
    .action-btn{display:flex;align-items:center;gap:0.5rem;padding:0.75rem 1.2rem;border-radius:9px;font-size:0.875rem;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;border:1px solid var(--border);background:var(--bg2);color:var(--text);}
    .action-btn:hover{border-color:var(--muted);transform:translateY(-1px);}
    .action-btn:active{transform:scale(0.96);}
    .action-btn.liked{color:var(--accent);border-color:rgba(255,59,59,0.35);background:rgba(255,59,59,0.06);}
    .action-btn.liked:hover{background:rgba(255,59,59,0.12);}

    /* SKELETON */
    .skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}

    /* TOAST */
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:0.7rem 1.3rem;border-radius:12px;font-size:0.82rem;font-weight:600;z-index:300;opacity:0;transition:all 0.3s;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,0.45);}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    .toast.success{border-color:rgba(34,197,94,0.4);}

    /* SHARE SHEET */
    .share-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:299;display:none;}
    .share-overlay.open{display:block;}
    .share-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);background:var(--bg2);border-top:1px solid var(--border);border-radius:22px 22px 0 0;z-index:300;padding:1.5rem 1.5rem 2.5rem;transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1);max-width:480px;width:100%;}
    .share-sheet.open{transform:translateX(-50%) translateY(0);}
    .share-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.2rem;}
    .share-title{font-family:'Space Grotesk',sans-serif;font-weight:700;margin-bottom:1.2rem;text-align:center;font-size:1rem;}
    .share-options{display:grid;grid-template-columns:repeat(4,1fr);gap:0.8rem;margin-bottom:1rem;}
    .share-opt{display:flex;flex-direction:column;align-items:center;gap:0.4rem;cursor:pointer;padding:0.9rem 0.5rem;border-radius:12px;background:var(--bg3);border:1px solid var(--border);transition:all 0.18s;}
    .share-opt:hover{border-color:var(--accent);transform:translateY(-2px);}
    .share-opt:active{transform:scale(0.95);}
    .share-opt-icon{font-size:1.5rem;}
    .share-opt-label{font-size:0.63rem;color:var(--muted);font-weight:600;}
    .share-url{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:0.75rem 1rem;font-size:0.72rem;color:var(--muted);word-break:break-all;margin-bottom:0.8rem;cursor:pointer;}
    .share-close{width:100%;padding:0.75rem;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:10px;cursor:pointer;font-weight:600;font-family:'Inter',sans-serif;}

    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(1.4);}}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.55;}}
    @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

    @media(max-width:600px){
      .stats-grid{grid-template-columns:repeat(2,1fr);}
      .source-row{flex-direction:column;}
      .article-date{margin-left:0;}
      .actions-bar{flex-direction:column;}
      .action-btn{justify-content:center;}
      .article-hero{height:240px;}
      .article-hero-placeholder{height:200px;}
    }
  </style>
</head>
<body>

<!-- READING PROGRESS -->
<div class="read-progress" id="readProgress"></div>

<!-- NAV -->
<nav>
  <a href="index.html" class="logo">
    <div class="logo-pulse"></div>
    <span class="logo-text">Conflict<span>Pulse</span></span>
  </a>
  <div class="nav-right">
    <a href="javascript:history.back()" class="back-btn" id="backBtn">← Back to Feed</a>
  </div>
</nav>

<!-- ARTICLE CONTENT -->
<div class="page" id="articlePage">
  <!-- Skeleton loading -->
  <div class="skeleton" style="height:420px;border-radius:16px;margin-bottom:2rem;"></div>
  <div style="display:flex;gap:0.5rem;margin-bottom:1.2rem;">
    <div class="skeleton" style="height:22px;width:80px;border-radius:99px;"></div>
    <div class="skeleton" style="height:22px;width:80px;border-radius:99px;"></div>
    <div class="skeleton" style="height:22px;width:80px;border-radius:99px;"></div>
  </div>
  <div class="skeleton" style="height:38px;margin-bottom:1.2rem;"></div>
  <div class="skeleton" style="height:16px;margin-bottom:0.5rem;"></div>
  <div class="skeleton" style="height:16px;width:80%;margin-bottom:0.5rem;"></div>
  <div class="skeleton" style="height:16px;width:65%;"></div>
</div>

<!-- SHARE SHEET -->
<div class="share-overlay" id="shareOverlay" onclick="closeShare()"></div>
<div class="share-sheet" id="shareSheet">
  <div class="share-handle"></div>
  <div class="share-title">📤 Share Article</div>
  <div class="share-options">
    <div class="share-opt" onclick="shareVia('copy')"><div class="share-opt-icon">🔗</div><div class="share-opt-label">Copy</div></div>
    <div class="share-opt" onclick="shareVia('whatsapp')"><div class="share-opt-icon">💬</div><div class="share-opt-label">WhatsApp</div></div>
    <div class="share-opt" onclick="shareVia('twitter')"><div class="share-opt-icon">𝕏</div><div class="share-opt-label">Twitter</div></div>
    <div class="share-opt" onclick="shareVia('telegram')"><div class="share-opt-icon">✈️</div><div class="share-opt-label">Telegram</div></div>
  </div>
  <div class="share-url" id="shareUrlDisplay" onclick="shareVia('copy')"></div>
  <button class="share-close" onclick="closeShare()">Close</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://conflictpulse-api.onrender.com';

// Domain-agnostic base
const BASE_URL = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '');

let articleData = null;
let visitorId   = localStorage.getItem('cp_vid') || crypto.randomUUID();
localStorage.setItem('cp_vid', visitorId);
let likedArticles = JSON.parse(localStorage.getItem('cp_liked') || '[]');

// Reading progress bar
window.addEventListener('scroll', () => {
  const doc  = document.documentElement;
  const top  = doc.scrollTop || document.body.scrollTop;
  const h    = doc.scrollHeight - doc.clientHeight;
  const pct  = h > 0 ? (top / h) * 100 : 0;
  document.getElementById('readProgress').style.width = pct + '%';
}, {passive:true});

// Back button — go to feed if no history
document.getElementById('backBtn').addEventListener('click', e => {
  if(document.referrer && document.referrer.includes(window.location.hostname)){
    history.back();
  } else {
    window.location.href = BASE_URL + '/feed.html';
  }
  e.preventDefault();
});

// Get article ID from URL
const urlParams = new URLSearchParams(window.location.search);
const articleId = urlParams.get('id');

if(!articleId){
  window.location.href = BASE_URL + '/feed.html';
} else {
  loadArticle(articleId);
}

async function loadArticle(id){
  try {
    // Track view
    fetch(`${API}/api/news/${id}/view`, {method:'POST'}).catch(()=>{});

    // Track visit
    const device = window.innerWidth < 768 ? 'mobile' : 'desktop';
    fetch(`${API}/api/track`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ visitorId, page:'/article', articleId:id, device, referrer: document.referrer ? new URL(document.referrer).hostname : 'direct' })
    }).catch(()=>{});

    const res  = await fetch(`${API}/api/news/${id}`);
    const data = await res.json();
    if(!data.success) throw new Error('Not found');

    articleData = data.article;
    renderArticle(data.article);
    loadRelated(data.article.region, data.article.topic, id);
  } catch(e) {
    document.getElementById('articlePage').innerHTML = `
      <div style="text-align:center;padding:5rem 0;">
        <div style="font-size:4rem;margin-bottom:1rem;">⚠️</div>
        <h2 style="font-family:'Space Grotesk',sans-serif;margin-bottom:0.6rem;">Article not found</h2>
        <p style="color:var(--muted);margin-bottom:2rem;">This article may have expired or been removed.</p>
        <a href="${BASE_URL}/feed.html" style="background:var(--accent);color:#fff;padding:0.85rem 1.8rem;border-radius:9px;text-decoration:none;font-weight:700;">← Back to Feed</a>
      </div>`;
  }
}

function renderArticle(a){
  const score      = a.conflictScore || 5;
  const scoreColor = score >= 8 ? '#FF3B3B' : score >= 5 ? '#F59E0B' : '#22C55E';
  const scoreText  = score >= 8 ? 'Major Conflict Event' : score >= 5 ? 'Active Conflict' : 'Low Intensity';
  const isLiked    = likedArticles.includes(a._id);
  const regionEmoji = getRegionEmoji(a.region);
  const shareUrl   = `${BASE_URL}/article.html?id=${a._id}`;

  // Update page title & OG meta
  document.title = `${a.title} — ConflictPulse`;
  setMeta('og:title',       a.title + ' — ConflictPulse');
  setMeta('og:description', a.summary || 'Read on ConflictPulse');
  setMeta('og:image',       a.imageUrl || 'icons/icon-512.png');

  const imgHtml = a.imageUrl
    ? `<img class="article-hero" src="${a.imageUrl}" alt="${a.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"/>
       <div class="article-hero-placeholder" style="display:none;"><span>${regionEmoji}</span><small>${a.region}</small></div>`
    : `<div class="article-hero-placeholder"><span>${regionEmoji}</span><small>${a.region}</small></div>`;

  document.getElementById('articlePage').innerHTML = `
    ${imgHtml}

    <div class="article-meta" style="animation:fadeUp 0.4s ease;">
      <span class="badge badge-${a.importance}">${importanceDot(a.importance)} ${a.importance?.toUpperCase()}</span>
      <span class="badge badge-region">${a.region}</span>
      <span class="badge badge-topic">${a.topic}</span>
      <span class="article-date">🕐 ${new Date(a.publishedAt).toLocaleString()}</span>
    </div>

    <h1 class="article-title" style="animation:fadeUp 0.45s ease;">${a.title}</h1>

    <div class="source-row" style="animation:fadeUp 0.5s ease;">
      <div class="source-info">
        <div class="source-avatar">📡</div>
        <div>
          <div class="source-name">${a.source}</div>
          <div class="source-label">Verified News Source</div>
        </div>
      </div>
      <div class="source-stats">
        <div class="stat-item">
          <div class="stat-num">👁️ ${(a.views||0).toLocaleString()}</div>
          <div class="stat-label">Views</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="articleLikesCount">❤️ ${(a.likes||0).toLocaleString()}</div>
          <div class="stat-label">Likes</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">🔗 ${(a.shares||0).toLocaleString()}</div>
          <div class="stat-label">Shares</div>
        </div>
      </div>
    </div>

    <!-- AI SUMMARY -->
    <div class="summary-box" style="animation:fadeUp 0.55s ease;">
      <div class="summary-label">🤖 Gemini AI Summary</div>
      <div class="summary-text">${a.summary || 'No AI summary available for this article.'}</div>
    </div>

    <!-- AD UNIT 1: Below Summary (high CTR position) -->
    <div class="ad-unit">
      <div class="ad-unit-label">Advertisement</div>
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-8026135429131617"
           data-ad-slot="AUTO"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});<\/script>
    </div>

    <!-- STATS -->
    <div class="stats-grid" style="animation:fadeUp 0.6s ease;">
      <div class="stat-card">
        <div class="stat-card-num" style="color:${scoreColor}">${score}/10</div>
        <div class="stat-card-label">Severity</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-num">👁️ ${(a.views||0).toLocaleString()}</div>
        <div class="stat-card-label">Views</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-num">❤️ ${(a.likes||0).toLocaleString()}</div>
        <div class="stat-card-label">Likes</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-num">🔗 ${(a.shares||0).toLocaleString()}</div>
        <div class="stat-card-label">Shares</div>
      </div>
    </div>

    <!-- CONFLICT SCORE -->
    <div class="score-section" style="animation:fadeUp 0.65s ease;">
      <div class="score-header">
        <div>
          <div class="score-title">Conflict Severity Score</div>
          <div class="score-sub">Rated by Gemini AI · Updated in real-time</div>
        </div>
        <div class="score-number" style="color:${scoreColor}">${score}<span style="font-size:1rem;color:var(--muted);font-weight:400;">/10</span></div>
      </div>
      <div class="score-track">
        <div class="score-fill" id="scoreFill" style="width:0%;background:${scoreColor};"></div>
      </div>
      <div class="score-levels">
        <span>Minor</span><span>Moderate</span><span>Severe</span><span>Catastrophic</span>
      </div>
      <div class="score-desc">
        ${score >= 8 ? '🔴' : score >= 5 ? '🟠' : '🟢'} <strong style="color:${scoreColor}">${scoreText}</strong> — ${getScoreDescription(score)}
      </div>
    </div>

    ${a.entities?.length ? `
    <div class="entities-section" style="animation:fadeUp 0.7s ease;">
      <div class="section-title">Entities Mentioned</div>
      <div class="entities-wrap">
        ${a.entities.map(e => `<span class="entity-tag">${e}</span>`).join('')}
      </div>
    </div>` : ''}

    <!-- ACTIONS -->
    <div class="actions-bar" style="animation:fadeUp 0.72s ease;">
      <button class="action-btn ${isLiked ? 'liked' : ''}" id="likeBtn" onclick="likeArticle('${a._id}')">
        <span id="likeEmoji">${isLiked ? '❤️' : '🤍'}</span> <span id="likeCount">${a.likes||0}</span> Likes
      </button>
      <button class="action-btn" onclick="openShare('${a._id}','${a.title.replace(/'/g,"\\'")}')"  >
        🔗 Share
      </button>
      <button class="action-btn" onclick="window.print()">
        🖨️ Print
      </button>
    </div>

    <!-- READ ORIGINAL -->
    <a href="${a.url}" target="_blank" rel="noopener" class="read-original" style="animation:fadeUp 0.74s ease;"
       onclick="trackShare('${a._id}')">
      📖 Read Full Original Article on ${a.source} →
    </a>

    <!-- AD UNIT 2: Above Related Articles -->
    <div class="ad-unit">
      <div class="ad-unit-label">Advertisement</div>
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-8026135429131617"
           data-ad-slot="AUTO"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});<\/script>
    </div>

    <div class="related-section" id="relatedSection">
      <div class="section-title">Related Articles</div>
      <div style="color:var(--muted);font-size:0.85rem;">Loading related articles...</div>
    </div>`;

  // Animate score bar
  setTimeout(() => {
    const fill = document.getElementById('scoreFill');
    if(fill) fill.style.width = `${score * 10}%`;
  }, 400);
}

function setMeta(prop, content){
  let el = document.querySelector(`meta[property="${prop}"]`);
  if(!el){ el = document.createElement('meta'); el.setAttribute('property', prop); document.head.appendChild(el); }
  el.setAttribute('content', content);
}

async function loadRelated(region, topic, excludeId){
  try {
    const res     = await fetch(`${API}/api/news?region=${encodeURIComponent(region)}&limit=4`);
    const data    = await res.json();
    const related = (data.articles || []).filter(a => a._id !== excludeId).slice(0,3);
    const section = document.getElementById('relatedSection');
    if(!section) return;
    if(!related.length){ section.innerHTML=''; return; }
    section.innerHTML = `
      <div class="section-title">Related Articles</div>
      <div class="related-grid">
        ${related.map(a => `
          <a href="${BASE_URL}/article.html?id=${a._id}" class="related-card">
            <div class="related-badge">${a.region} · ${a.topic}</div>
            <div class="related-title">${a.title}</div>
            <div class="related-meta">📡 ${a.source} · ${getTimeAgo(a.publishedAt)}</div>
          </a>`).join('')}
      </div>`;
  } catch(e){}
}

async function likeArticle(id){
  if(likedArticles.includes(id)){ showToast('Already liked! ❤️'); return; }
  // Optimistic
  const btn   = document.getElementById('likeBtn');
  const emoji = document.getElementById('likeEmoji');
  const count = document.getElementById('likeCount');
  const sCount= document.getElementById('articleLikesCount');
  if(btn) btn.classList.add('liked');
  if(emoji) emoji.textContent = '❤️';
  const cur = parseInt(count?.textContent||0)+1;
  if(count) count.textContent = cur;
  if(sCount) sCount.textContent = `❤️ ${cur.toLocaleString()}`;
  likedArticles.push(id);
  localStorage.setItem('cp_liked', JSON.stringify(likedArticles));
  showToast('❤️ Liked!');
  try {
    const res  = await fetch(`${API}/api/news/${id}/like`, {method:'POST'});
    const data = await res.json();
    if(count && data.likes) count.textContent = data.likes;
    if(sCount && data.likes) sCount.textContent = `❤️ ${data.likes.toLocaleString()}`;
  } catch(e){}
}

function openShare(id, title){
  fetch(`${API}/api/news/${id}/share`, {method:'POST'}).catch(()=>{});
  const url = `${BASE_URL}/article.html?id=${id}`;
  document.getElementById('shareUrlDisplay').textContent = url;
  document.getElementById('shareSheet')._data = {title, url};
  document.getElementById('shareSheet').classList.add('open');
  document.getElementById('shareOverlay').classList.add('open');
}
function closeShare(){
  document.getElementById('shareSheet').classList.remove('open');
  document.getElementById('shareOverlay').classList.remove('open');
}
async function shareVia(method){
  const sheet = document.getElementById('shareSheet');
  const {title, url} = sheet._data || {title:document.title, url:window.location.href};
  const text = `📰 ${title} — Read on ConflictPulse`;
  if(method==='copy'){ await navigator.clipboard.writeText(url); showToast('🔗 Link copied!'); closeShare(); }
  else if(method==='whatsapp') window.open(`https://wa.me/?text=${encodeURIComponent(text+'\n'+url)}`,'_blank');
  else if(method==='twitter')  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`,'_blank');
  else if(method==='telegram') window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`,'_blank');
}

function trackShare(id){
  fetch(`${API}/api/news/${id}/share`, {method:'POST'}).catch(()=>{});
}
function getScoreDescription(score){
  if(score >= 9) return 'Mass casualty event or existential-level threat detected';
  if(score >= 7) return 'Major military engagement with significant casualties reported';
  if(score >= 5) return 'Active armed conflict with ongoing military operations';
  if(score >= 3) return 'Escalating tensions or limited military activity';
  return 'Low-level tension or diplomatic conflict';
}
function getRegionEmoji(r){
  return {'Middle East':'🕌','Europe':'🇪🇺','Africa':'🌍','Asia':'🌏','Americas':'🌎','Global':'🌐','Russia & CIS':'🐻','South Asia':'🇮🇳'}[r]||'🌐';
}
function importanceDot(imp){ return {breaking:'🔴',high:'🟠',medium:'🔵',low:'⚪'}[imp]||'⚪'; }
function getTimeAgo(date){
  const diff = Date.now() - new Date(date);
  const mins = Math.floor(diff/60000), hours = Math.floor(mins/60), days = Math.floor(hours/24);
  if(mins<1) return 'Just now'; if(mins<60) return `${mins}m ago`; if(hours<24) return `${hours}h ago`; return `${days}d ago`;
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast success show';
  clearTimeout(t._t); t._t = setTimeout(()=> t.classList.remove('show'), 2500);
}
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
