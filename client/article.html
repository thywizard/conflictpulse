<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8026135429131617"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Article — ConflictPulse</title>
  <meta name="description" content="Full article view with AI summary, conflict score and entity analysis."/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="icons/icon-192.png"/>
  <meta name="theme-color" content="#0A0E1A"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"/>
  <style>
    :root{
      --bg:#0A0E1A; --bg2:#111827; --bg3:#1E2D40;
      --accent:#FF3B3B; --blue:#3B82F6;
      --green:#22C55E; --amber:#F59E0B;
      --text:#F0F4F8; --muted:#94A3B8; --border:#1E293B;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

    /* NAV */
    nav{position:sticky;top:0;z-index:100;padding:0.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center;background:rgba(10,14,26,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);}
    .logo{display:flex;align-items:center;gap:0.5rem;text-decoration:none;}
    .logo-pulse{width:9px;height:9px;background:var(--accent);border-radius:50%;animation:pulse 1.5s infinite;}
    .logo-text{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;color:var(--text);}
    .logo-text span{color:var(--accent);}
    .nav-right{display:flex;align-items:center;gap:1rem;}
    .back-btn{color:var(--muted);text-decoration:none;font-size:0.85rem;font-weight:500;display:flex;align-items:center;gap:0.3rem;transition:color 0.2s;}
    .back-btn:hover{color:var(--text);}

    /* PAGE */
    .page{max-width:820px;margin:0 auto;padding:2.5rem 1.5rem 4rem;}

    /* HERO IMAGE */
    .article-hero{width:100%;height:400px;object-fit:cover;border-radius:16px;margin-bottom:2rem;border:1px solid var(--border);}
    .article-hero-placeholder{width:100%;height:300px;background:linear-gradient(135deg,var(--bg3),var(--bg2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:6rem;margin-bottom:2rem;border:1px solid var(--border);}

    /* META */
    .article-meta{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1.2rem;align-items:center;}
    .badge{display:inline-flex;align-items:center;gap:0.25rem;padding:0.25rem 0.7rem;border-radius:99px;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;}
    .badge-breaking{background:rgba(255,59,59,0.15);color:var(--accent);border:1px solid rgba(255,59,59,0.3);animation:blink 1.5s infinite;}
    .badge-high{background:rgba(245,158,11,0.15);color:var(--amber);}
    .badge-medium{background:rgba(59,130,246,0.15);color:var(--blue);}
    .badge-low{background:rgba(148,163,184,0.1);color:var(--muted);}
    .badge-region{background:var(--bg3);color:var(--muted);}
    .badge-topic{background:rgba(34,197,94,0.1);color:var(--green);}
    .article-date{font-size:0.8rem;color:var(--muted);margin-left:auto;}

    /* TITLE */
    .article-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;line-height:1.25;margin-bottom:1rem;letter-spacing:-0.02em;}

    /* SOURCE ROW */
    .source-row{display:flex;align-items:center;justify-content:space-between;padding:1rem;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:2rem;flex-wrap:wrap;gap:0.8rem;}
    .source-info{display:flex;align-items:center;gap:0.7rem;}
    .source-avatar{width:36px;height:36px;background:var(--bg3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;}
    .source-name{font-weight:600;font-size:0.9rem;}
    .source-label{font-size:0.75rem;color:var(--muted);}
    .source-stats{display:flex;gap:1.2rem;}
    .stat-item{text-align:center;}
    .stat-num{font-size:1rem;font-weight:700;}
    .stat-label{font-size:0.7rem;color:var(--muted);}

    /* AI SUMMARY BOX */
    .summary-box{background:linear-gradient(135deg,rgba(255,59,59,0.05),rgba(59,130,246,0.05));border:1px solid rgba(255,59,59,0.2);border-radius:12px;padding:1.5rem;margin-bottom:2rem;position:relative;overflow:hidden;}
    .summary-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--blue));}
    .summary-label{display:flex;align-items:center;gap:0.5rem;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);margin-bottom:0.8rem;}
    .summary-text{font-size:1rem;line-height:1.8;color:var(--text);}

    /* STATS GRID */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
    .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1rem;text-align:center;}
    .stat-card-num{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:0.2rem;}
    .stat-card-label{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}

    /* CONFLICT SCORE */
    .score-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:2rem;}
    .score-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
    .score-title{font-weight:600;font-size:0.9rem;}
    .score-number{font-family:'Space Grotesk',sans-serif;font-size:2.5rem;font-weight:800;}
    .score-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:0.5rem;}
    .score-fill{height:100%;border-radius:4px;transition:width 1s ease;}
    .score-desc{font-size:0.8rem;color:var(--muted);}
    .score-levels{display:flex;justify-content:space-between;font-size:0.7rem;color:var(--muted);margin-top:0.3rem;}

    /* ENTITIES */
    .entities-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:2rem;}
    .section-title{font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:1rem;}
    .entities-wrap{display:flex;flex-wrap:wrap;gap:0.5rem;}
    .entity-tag{background:var(--bg3);color:var(--text);font-size:0.82rem;padding:0.3rem 0.8rem;border-radius:6px;border:1px solid var(--border);transition:all 0.15s;cursor:default;}
    .entity-tag:hover{border-color:var(--accent);color:var(--accent);}

    /* RELATED */
    .related-section{margin-bottom:2rem;}
    .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;margin-top:1rem;}
    .related-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1rem;cursor:pointer;transition:all 0.2s;text-decoration:none;display:block;}
    .related-card:hover{border-color:rgba(255,59,59,0.3);transform:translateY(-2px);}
    .related-badge{font-size:0.68rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.4rem;}
    .related-title{font-size:0.88rem;font-weight:600;line-height:1.4;color:var(--text);margin-bottom:0.4rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .related-meta{font-size:0.75rem;color:var(--muted);}

    /* CTA */
    .read-original{display:flex;align-items:center;justify-content:center;gap:0.7rem;background:var(--accent);color:#fff;padding:1rem 2rem;border-radius:10px;font-weight:700;font-size:1rem;text-decoration:none;margin-bottom:2rem;transition:all 0.2s;box-shadow:0 0 30px rgba(255,59,59,0.2);}
    .read-original:hover{background:#cc2f2f;box-shadow:0 0 40px rgba(255,59,59,0.4);}

    /* ACTIONS BAR */
    .actions-bar{display:flex;gap:0.8rem;margin-bottom:2rem;flex-wrap:wrap;}
    .action-btn{display:flex;align-items:center;gap:0.5rem;padding:0.7rem 1.2rem;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;border:1px solid var(--border);background:var(--bg2);color:var(--text);}
    .action-btn:hover{border-color:var(--muted);}
    .action-btn.liked{color:var(--accent);border-color:rgba(255,59,59,0.3);background:rgba(255,59,59,0.05);}

    /* SKELETON */
    .skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}

    /* TOAST */
    .toast{position:fixed;bottom:2rem;right:2rem;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:0.8rem 1.2rem;border-radius:8px;font-size:0.85rem;font-weight:500;z-index:300;transform:translateY(100px);opacity:0;transition:all 0.3s;}
    .toast.show{transform:translateY(0);opacity:1;}

    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(1.3);}}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.6;}}
    @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

    @media(max-width:600px){
      .stats-grid{grid-template-columns:repeat(2,1fr);}
      .source-row{flex-direction:column;}
      .article-date{margin-left:0;}
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="logo">
    <div class="logo-pulse"></div>
    <span class="logo-text">Conflict<span>Pulse</span></span>
  </a>
  <div class="nav-right">
    <a href="feed.html" class="back-btn">← Back to Feed</a>
  </div>
</nav>

<!-- ARTICLE CONTENT -->
<div class="page" id="articlePage">
  <!-- loaded by JS -->
  <div style="text-align:center;padding:4rem 0;">
    <div class="skeleton" style="height:400px;border-radius:16px;margin-bottom:2rem;"></div>
    <div class="skeleton" style="height:20px;width:60%;margin:0 auto 1rem;"></div>
    <div class="skeleton" style="height:40px;margin-bottom:1rem;"></div>
    <div class="skeleton" style="height:16px;margin-bottom:0.5rem;"></div>
    <div class="skeleton" style="height:16px;width:80%;margin-bottom:0.5rem;"></div>
    <div class="skeleton" style="height:16px;width:70%;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://conflictpulse-api.onrender.com';
let articleData = null;
let visitorId = localStorage.getItem('visitorId') || crypto.randomUUID();
localStorage.setItem('visitorId', visitorId);
let likedArticles = JSON.parse(localStorage.getItem('likedArticles') || '[]');

// Get article ID from URL
const urlParams = new URLSearchParams(window.location.search);
const articleId = urlParams.get('id');

if(!articleId){
  window.location.href = 'feed.html';
} else {
  loadArticle(articleId);
}

async function loadArticle(id){
  try {
    // Track view
    await fetch(`${API}/api/news/${id}/view`, {method:'POST'});

    // Track visit
    const device = window.innerWidth < 768 ? 'mobile' : 'desktop';
    fetch(`${API}/api/track`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ visitorId, page:'/article', articleId:id, device, referrer: document.referrer ? new URL(document.referrer).hostname : 'direct' })
    }).catch(()=>{});

    const res = await fetch(`${API}/api/news/${id}`);
    const data = await res.json();
    if(!data.success) throw new Error('Not found');

    articleData = data.article;
    renderArticle(data.article);

    // Load related
    loadRelated(data.article.region, data.article.topic, id);
  } catch(e) {
    document.getElementById('articlePage').innerHTML = `
      <div style="text-align:center;padding:4rem 0;">
        <div style="font-size:4rem;margin-bottom:1rem;">⚠️</div>
        <h2 style="font-family:'Space Grotesk',sans-serif;margin-bottom:0.5rem;">Article not found</h2>
        <p style="color:var(--muted);margin-bottom:2rem;">This article may have expired or been removed.</p>
        <a href="feed.html" style="background:var(--accent);color:#fff;padding:0.8rem 1.5rem;border-radius:8px;text-decoration:none;font-weight:600;">← Back to Feed</a>
      </div>`;
  }
}

function renderArticle(a){
  const score = a.conflictScore || 5;
  const scoreColor = score >= 8 ? '#FF3B3B' : score >= 5 ? '#F59E0B' : '#22C55E';
  const scoreText = score >= 8 ? 'Major Conflict Event' : score >= 5 ? 'Active Conflict' : 'Low Intensity';
  const isLiked = likedArticles.includes(a._id);
  const regionEmoji = getRegionEmoji(a.region);

  // Update page title & meta
  document.title = `${a.title} — ConflictPulse`;

  const imgHtml = a.imageUrl
    ? `<img class="article-hero" src="${a.imageUrl}" alt="${a.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"/><div class="article-hero-placeholder" style="display:none;">${regionEmoji}</div>`
    : `<div class="article-hero-placeholder">${regionEmoji}</div>`;

  document.getElementById('articlePage').innerHTML = `
    ${imgHtml}

    <div class="article-meta">
      <span class="badge badge-${a.importance}">${importanceDot(a.importance)} ${a.importance?.toUpperCase()}</span>
      <span class="badge badge-region">${a.region}</span>
      <span class="badge badge-topic">${a.topic}</span>
      <span class="article-date">🕐 ${new Date(a.publishedAt).toLocaleString()}</span>
    </div>

    <h1 class="article-title">${a.title}</h1>

    <div class="source-row">
      <div class="source-info">
        <div class="source-avatar">📡</div>
        <div>
          <div class="source-name">${a.source}</div>
          <div class="source-label">News Source</div>
        </div>
      </div>
      <div class="source-stats">
        <div class="stat-item">
          <div class="stat-num">👁️ ${(a.views||0).toLocaleString()}</div>
          <div class="stat-label">Views</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">❤️ ${(a.likes||0).toLocaleString()}</div>
          <div class="stat-label">Likes</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">🔗 ${(a.shares||0).toLocaleString()}</div>
          <div class="stat-label">Shares</div>
        </div>
      </div>
    </div>

    <div class="summary-box">
      <div class="summary-label">🤖 Gemini AI Summary</div>
      <div class="summary-text">${a.summary || 'No AI summary available for this article.'}</div>
    </div>

    <div class="score-section">
      <div class="score-header">
        <div>
          <div class="score-title">Conflict Severity Score</div>
          <div style="font-size:0.8rem;color:var(--muted);">Rated by Gemini AI</div>
        </div>
        <div class="score-number" style="color:${scoreColor}">${score}<span style="font-size:1rem;color:var(--muted)">/10</span></div>
      </div>
      <div class="score-track">
        <div class="score-fill" id="scoreFill" style="width:0%;background:${scoreColor};"></div>
      </div>
      <div class="score-levels">
        <span>Minor</span><span>Moderate</span><span>Severe</span><span>Catastrophic</span>
      </div>
      <div class="score-desc" style="margin-top:0.8rem;">
        ${score >= 8 ? '🔴' : score >= 5 ? '🟠' : '🟢'} <strong style="color:${scoreColor}">${scoreText}</strong>
        — ${getScoreDescription(score)}
      </div>
    </div>

    ${a.entities?.length ? `
    <div class="entities-section">
      <div class="section-title">Entities Mentioned</div>
      <div class="entities-wrap">
        ${a.entities.map(e => `<span class="entity-tag">${e}</span>`).join('')}
      </div>
    </div>` : ''}

    <div class="actions-bar">
      <button class="action-btn ${isLiked ? 'liked' : ''}" id="likeBtn" onclick="likeArticle('${a._id}')">
        ${isLiked ? '❤️' : '🤍'} <span id="likeCount">${a.likes||0}</span> Likes
      </button>
      <button class="action-btn" onclick="shareArticle('${a._id}','${a.title.replace(/'/g,"\\'")}')">
        🔗 Share
      </button>
      <button class="action-btn" onclick="window.print()">
        🖨️ Print
      </button>
    </div>

    <a href="${a.url}" target="_blank" rel="noopener" class="read-original" onclick="trackShare('${a._id}')">
      📖 Read Full Original Article on ${a.source} →
    </a>

    <div class="related-section" id="relatedSection">
      <div class="section-title">Related Articles</div>
      <div style="color:var(--muted);font-size:0.85rem;">Loading related articles...</div>
    </div>`;

  // Animate score bar
  setTimeout(() => {
    const fill = document.getElementById('scoreFill');
    if(fill) fill.style.width = `${score * 10}%`;
  }, 300);
}

async function loadRelated(region, topic, excludeId){
  try {
    const res = await fetch(`${API}/api/news?region=${encodeURIComponent(region)}&limit=4`);
    const data = await res.json();
    const related = (data.articles || []).filter(a => a._id !== excludeId).slice(0,3);
    if(!related.length) return;

    const section = document.getElementById('relatedSection');
    if(!section) return;

    section.innerHTML = `
      <div class="section-title">Related Articles</div>
      <div class="related-grid">
        ${related.map(a => `
          <a href="article.html?id=${a._id}" class="related-card">
            <div class="related-badge">${a.region} · ${a.topic}</div>
            <div class="related-title">${a.title}</div>
            <div class="related-meta">📡 ${a.source} · ${getTimeAgo(a.publishedAt)}</div>
          </a>`).join('')}
      </div>`;
  } catch(e){}
}

async function likeArticle(id){
  if(likedArticles.includes(id)){ showToast('Already liked!'); return; }
  try {
    const res = await fetch(`${API}/api/news/${id}/like`, {method:'POST'});
    const data = await res.json();
    likedArticles.push(id);
    localStorage.setItem('likedArticles', JSON.stringify(likedArticles));
    document.getElementById('likeBtn').classList.add('liked');
    document.getElementById('likeBtn').innerHTML = `❤️ <span id="likeCount">${data.likes}</span> Likes`;
    showToast('❤️ Liked!');
  } catch(e){ showToast('Failed'); }
}

async function shareArticle(id, title){
  await fetch(`${API}/api/news/${id}/share`, {method:'POST'}).catch(()=>{});
  const url = window.location.href;
  if(navigator.share){
    navigator.share({ title, text:`Check this on ConflictPulse: ${title}`, url });
  } else {
    navigator.clipboard.writeText(url);
    showToast('🔗 Link copied!');
  }
}

function trackShare(id){
  fetch(`${API}/api/news/${id}/share`, {method:'POST'}).catch(()=>{});
}

function getScoreDescription(score){
  if(score >= 9) return 'Mass casualty event or nuclear-level threat detected';
  if(score >= 7) return 'Major military engagement with significant casualties';
  if(score >= 5) return 'Active armed conflict with ongoing military operations';
  if(score >= 3) return 'Escalating tensions or limited military activity';
  return 'Low-level tension or diplomatic conflict';
}

function getRegionEmoji(region){
  const map = {'Middle East':'🕌','Europe':'🇪🇺','Africa':'🌍','Asia':'🌏',
    'Americas':'🌎','Global':'🌐','Russia & CIS':'🐻','South Asia':'🇮🇳'};
  return map[region] || '🌐';
}

function importanceDot(imp){
  return {breaking:'🔴',high:'🟠',medium:'🔵',low:'⚪'}[imp] || '⚪';
}

function getTimeAgo(date){
  const diff = Date.now() - new Date(date);
  const mins = Math.floor(diff/60000);
  const hours = Math.floor(mins/60);
  const days = Math.floor(hours/24);
  if(mins < 1) return 'Just now';
  if(mins < 60) return `${mins}m ago`;
  if(hours < 24) return `${hours}h ago`;
  return `${days}d ago`;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2500);
}

if('serviceWorker' in navigator)
  navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
